---
all:
  children:
    hpc:
      vars:
        ansible_user: root
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
      children:
        head:
          hosts:
            head:
              ansible_host: head
        compute:
          hosts:
            compute1:
              ansible_host: compute1
            compute2:
              ansible_host: compute2
        storage:
          hosts:
            storage:
              ansible_host: storage

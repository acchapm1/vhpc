---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: compute1-disk
  namespace: hpc-cluster
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: hpc-local
---

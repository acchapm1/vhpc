apiVersion: v1
kind: Service
metadata:
  name: nfs-server
  namespace: hpc-cluster
spec:
  selector:
    kubevirt.io/vm: storage
  ports:
  - name: nfs
    port: 2049
    targetPort: 2049
  - name: rpcbind-tcp
    port: 111
    targetPort: 111
    protocol: TCP
  - name: rpcbind-udp
    port: 111
    targetPort: 111
    protocol: UDP
